<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KautilyaOS | Dharma Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0b10;
            --bg-surface: rgba(20, 22, 32, 0.7);
            --accent-gold: #d4af37;
            --accent-bronze: #cd7f32;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(205, 127, 50, 0.05) 0%, transparent 40%);
        }

        /* Header & Clock */
        header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--accent-gold);
            text-transform: uppercase;
        }

        #clock {
            font-weight: 300;
            font-size: 1.2rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* Chat Container */
        main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-bronze) transparent;
        }

        .message {
            max-width: 80%;
            padding: 1.2rem;
            border-radius: 1.5rem;
            font-size: 1rem;
            line-height: 1.6;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: var(--accent-bronze);
            color: white;
            border-bottom-right-radius: 0.2rem;
        }

        .chanakya-message {
            align-self: flex-start;
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 0.2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        .chanakya-message strong {
            color: var(--accent-gold);
            display: block;
            margin-bottom: 0.5rem;
            font-family: 'Playfair Display', serif;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        /* Input Area */
        footer {
            padding: 2rem;
            background: transparent;
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            background: var(--bg-surface);
            border: 1px solid var(--glass-border);
            border-radius: 3rem;
            padding: 0.5rem;
            display: flex;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 45px rgba(0,0,0,0.5);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
        }

        button {
            background: var(--accent-gold);
            border: none;
            color: black;
            padding: 0 2rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }

        button:hover {
            transform: scale(1.05);
            background: white;
        }

        button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        /* Markdown-ish formatting */
        .message p { margin-bottom: 0.8rem; }
        .message b { color: var(--accent-gold); }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #4caf50;
        }

    </style>
</head>
<body>

    <header>
        <div class="brand">Kautilya<span style="color: white;">OS</span></div>
        <div id="clock">12:00:00 AM</div>
    </header>

    <main id="chat-box">
        <div class="message chanakya-message">
            <strong>The Guru Awaits</strong>
            <p>Warrior, your dharma does not rest. Speak your intent, and I shall judge its worth.</p>
        </div>
    </main>

    <footer>
        <form id="chat-form" class="input-container">
            <input type="text" id="user-input" placeholder="Execute command..." autocomplete="off">
            <button type="submit" id="send-btn">Transmit</button>
        </form>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Clock logic
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role === 'user' ? 'user-message' : 'chanakya-message'}`;
            
            if (role === 'chanakya') {
                div.innerHTML = `<strong>Chanakya</strong><p>${text.replace(/\n/g, '<br>')}</p>`;
            } else {
                div.innerText = text;
            }
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                addMessage(data.response, 'chanakya');
            } catch (err) {
                addMessage("Communication failure. The cloud is thick.", 'chanakya');
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        };
    </script>
</body>
</html>
